<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GamerChat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: #111114;
      border-right: 1px solid #1e1e24;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      gap: 10px;
    }SSSSSSSS

    .sidebar-header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }

    .section-label {
      padding: 16px 16px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #555;
      font-weight: 600;
    }

    .channel-list {
      list-style: none;
    }

    .channel-list li {
      padding: 10px 16px;
      cursor: pointer;
      border-radius: 8px;
      margin: 2px 8px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
    }

    .channel-list li:hover { background: #1a1a20; }
    .channel-list li.active { background: #7c3aed22; color: #a78bfa; }

    .channel-list li .hash { color: #555; font-weight: 700; }

    /* ── DM List ── */
    .dm-list { list-style: none; }

    .dm-list li {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 8px;
      margin: 2px 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .15s;
    }

    .dm-list li:hover { background: #1a1a20; }
    .dm-list li.active { background: #7c3aed22; color: #a78bfa; }

    .dm-list li .dm-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }

    .dm-list li .dm-name { flex: 1; }

    .dm-list li .dm-badge {
      background: #7c3aed; color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px; display: none;
    }

    .dm-list li .dm-badge.show { display: inline; }

    .online-section {
      border-top: 1px solid #1e1e24;
      padding: 12px 16px;
    }

    .online-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #555;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .online-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: background .15s;
    }

    .online-user:hover { background: #1a1a20; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      flex-shrink: 0;
    }

    .dm-hint {
      font-size: 10px;
      color: #7c3aed;
      margin-left: auto;
      opacity: 0;
      transition: opacity .15s;
    }

    .online-user:hover .dm-hint { opacity: 1; }

    /* ── Main Chat ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111114;
    }

    .chat-header .header-icon { color: #555; font-size: 20px; font-weight: 700; }
    .chat-header .channel-name { font-weight: 600; font-size: 16px; }
    .chat-header .channel-desc { color: #666; font-size: 13px; margin-left: 12px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }

    .msg-group {
      display: flex;
      gap: 12px;
      padding: 8px 0;
    }

    .msg-group:hover { background: #ffffff05; margin: 0 -24px; padding: 8px 24px; border-radius: 4px; }

    .msg-info .username {
      font-weight: 600;
      font-size: 14px;
      color: #a78bfa;
    }

    .msg-info .timestamp {
      font-size: 11px;
      color: #555;
      margin-left: 8px;
    }

    .msg-info .text {
      font-size: 14px;
      line-height: 1.5;
      color: #ccc;
      margin-top: 2px;
    }

    .msg-info .bot-tag {
      font-size: 9px;
      background: #7c3aed;
      color: #fff;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 700;
      vertical-align: middle;
    }

    /* ── Chat Input ── */
    .chat-input-area {
      padding: 16px 24px 20px;
      background: #0d0d0f;
      position: relative;
    }

    .chat-input-wrapper {
      background: #18181d;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 4px 8px;
      transition: border-color .2s;
    }

    .chat-input-wrapper:focus-within { border-color: #7c3aed; }

    .chat-input-wrapper button.emoji-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: color .15s;
    }

    .chat-input-wrapper button.emoji-btn:hover { color: #a78bfa; }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 8px;
    }

    #messageInput::placeholder { color: #555; }

    .chat-input-wrapper button.send-btn {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: opacity .15s;
    }

    .chat-input-wrapper button.send-btn:hover { opacity: .85; }

    /* ── Username Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      display: grid;
      place-items: center;
      z-index: 100;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: #18181d;
      border: 1px solid #2a2a32;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      width: 360px;
    }

    .modal h2 {
      font-size: 22px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal p { color: #666; font-size: 13px; margin-bottom: 24px; }

    .modal input {
      width: 100%;
      padding: 12px 16px;
      background: #0d0d0f;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }

    .modal input:focus { border-color: #7c3aed; }

    .modal button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }

    .modal button:hover { opacity: .85; }

    /* ── Typing Indicator ── */
    .typing-indicator {
      padding: 0 24px 4px;
      font-size: 12px;
      color: #a78bfa;
      height: 20px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>

      <p>Choose your gamertag to enter the arena</p>

      <button id="joinBtn">Join Chat</button>

  <!-- Sidebar -->

  </aside>

    <div class="messages" id="messages"></div>

    <div class="typing-indicator" id="typingIndicator"></div>

    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <button class="emoji-btn" id="emojiBtn" title="Emoji">😊</button>
        <input type="text" id="messageInput" placeholder="Message #general" maxlength="500" autocomplete="off">
        <button class="send-btn" id="sendBtn" title="Send">➤</button>
      </div>
    </div>
  </main>

    // ── State ──
    const state = {
      username: '',
      currentView: { type: 'channel', name: 'general' },
      channels: {
        general: [],
        valorant: [],
        minecraft: [],
        fortnite: [],
        'lfg-party': [],
        'clips-highlights': []
      },
      dms: {},
      dmUnread: {},
      onlineUsers: new Set(),
      colors: ['#a78bfa','#22d3ee','#f472b6','#facc15','#34d399','#fb923c','#60a5fa','#e879f9']
    };

    const channelDescs = {
      general: 'Talk about anything gaming',
      valorant: 'Valorant tactics & plays',
      minecraft: 'Blocks, builds & adventures',
      fortnite: 'Battle royale action',
      'lfg-party': 'Find teammates',
      'clips-highlights': 'Share your best moments'
    };

    // ── Elements ──
    const $modal       = document.getElementById('usernameModal');
    const $usernameIn  = document.getElementById('usernameInput');
    const $joinBtn     = document.getElementById('joinBtn');
    const $messages    = document.getElementById('messages');
    const $msgInput    = document.getElementById('messageInput');
    const $sendBtn     = document.getElementById('sendBtn');
    const $emojiBtn    = document.getElementById('emojiBtn');
    const $channelList = document.getElementById('channelList');
    const $dmList      = document.getElementById('dmList');
    const $headerIcon  = document.getElementById('headerIcon');
    const $channelName = document.getElementById('currentChannel');
    const $channelDesc = document.getElementById('channelDesc');
    const $onlineCount = document.getElementById('onlineCount');
    const $onlineUsers = document.getElementById('onlineUsers');
    const $typingInd   = document.getElementById('typingIndicator');

    // ── Helpers ──
    function getUserColor(name) {
      let hash = 0;
      for (const c of name) hash = c.charCodeAt(0) + ((hash << 5) - hash);
      return state.colors[Math.abs(hash) % state.colors.length];
    }

    function timeNow() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function sanitize(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function isBot(name) {
      return name in bots;
    }

    // ── Switch View ──
    function switchToChannel(name) {
      state.currentView = { type: 'channel', name };
      $headerIcon.textContent = '#';
      $channelName.textContent = name;
      $channelDesc.textContent = channelDescs[name] || '';
      $msgInput.placeholder = 'Message #' + name;
      updateSidebarActive();
      renderMessages();
    }

    function switchToDM(botName) {
      if (!state.dms[botName]) {
        state.dms[botName] = [];
        state.dms[botName].push({
          user: botName, text: dmResponses[botName].greeting, time: timeNow()
        });
        renderDMList();
      }
      state.dmUnread[botName] = 0;
      state.currentView = { type: 'dm', name: botName };
      $headerIcon.textContent = '💬';
      $channelName.textContent = botName;
      $channelDesc.textContent = 'Direct Message';
      $msgInput.placeholder = 'Message ' + botName;
      updateSidebarActive();
      renderDMList();
      renderMessages();
    }

    function updateSidebarActive() {
      document.querySelectorAll('#channelList li').forEach(li => {
        li.classList.toggle('active',
          state.currentView.type === 'channel' && li.dataset.channel === state.currentView.name);
      });
      document.querySelectorAll('#dmList li').forEach(li => {
        li.classList.toggle('active',
          state.currentView.type === 'dm' && li.dataset.dm === state.currentView.name);
      });
    }

    // ── Render Messages ──
    function renderMessages() {
      const v = state.currentView;
      const msgs = v.type === 'channel' ? state.channels[v.name] : (state.dms[v.name] || []);
      $messages.innerHTML = '';

      if (!msgs || msgs.length === 0) {
        const icon = v.type === 'dm' ? '💬' : '🎮';
        const title = v.type === 'dm' ? 'DM with ' + v.name : '#' + v.name;
        $messages.innerHTML =
          '<div style="margin:auto;text-align:center;color:#444">' +
            '<div style="font-size:48px;margin-bottom:12px">' + icon + '</div>' +
            '<div style="font-size:16px;font-weight:600">Welcome to ' + sanitize(title) + '</div>' +
            '<div style="font-size:13px;margin-top:4px">Be the first to send a message!</div>' +
          '</div>';
        return;
      }

      msgs.forEach(msg => {
        const color = msg.system ? '#555' : getUserColor(msg.user);
        const group = document.createElement('div');
        group.className = 'msg-group';

        if (msg.system) {
          group.innerHTML =
            '<div style="width:100%;text-align:center;font-size:12px;color:#555;padding:4px 0">' +
              sanitize(msg.text) +
            '</div>';
        } else {
          const initials = msg.user.slice(0, 2).toUpperCase();
          const botTag = isBot(msg.user) ? '<span class="bot-tag">BOT</span>' : '';
          group.innerHTML =
            '<div class="avatar" style="background:' + color + '22;color:' + color + '">' + initials + '</div>' +
            '<div class="msg-info">' +
              '<span class="username" style="color:' + color + '">' + sanitize(msg.user) + '</span>' + botTag +
              '<span class="timestamp">' + msg.time + '</span>' +
              '<div class="text">' + sanitize(msg.text) + '</div>' +
            '</div>';
        }

        $messages.appendChild(group);
      });

      $messages.scrollTop = $messages.scrollHeight;
    }

    // ── Render Online Users ──
    function renderOnline() {
      $onlineCount.textContent = state.onlineUsers.size;
      $onlineUsers.innerHTML = '';
      state.onlineUsers.forEach(name => {
        if (name === state.username) return;
        const color = getUserColor(name);
        const initials = name.slice(0, 2).toUpperCase();
        const el = document.createElement('div');
        el.className = 'online-user';
        if (isBot(name)) el.title = 'Click to DM ' + name;
        el.innerHTML =
          '<div class="avatar" style="background:' + color + '22;color:' + color + ';width:28px;height:28px;font-size:12px">' + initials + '</div>' +
          '<span>' + sanitize(name) + '</span>' +
          (isBot(name) ? '<span class="dm-hint">DM</span>' : '') +
          '<div class="status-dot"></div>';
        if (isBot(name)) {
          el.addEventListener('click', () => switchToDM(name));
        }
        $onlineUsers.appendChild(el);
      });
    }

    // ── Render DM List ──
    function renderDMList() {
      $dmList.innerHTML = '';
      Object.keys(state.dms).forEach(botName => {
        const color = getUserColor(botName);
        const initials = botName.slice(0, 2).toUpperCase();
        const unread = state.dmUnread[botName] || 0;
        const li = document.createElement('li');
        li.dataset.dm = botName;
        if (state.currentView.type === 'dm' && state.currentView.name === botName) {
          li.classList.add('active');
        }
        li.innerHTML =
          '<div class="dm-avatar" style="background:' + color + '22;color:' + color + '">' + initials + '</div>' +
          '<span class="dm-name">' + sanitize(botName) + '</span>' +
          '<span class="dm-badge ' + (unread > 0 ? 'show' : '') + '">' + unread + '</span>';
        li.addEventListener('click', () => switchToDM(botName));
        $dmList.appendChild(li);
      });
    }

    // ── Bot Response Logic (Channels) ──
    function triggerBotResponses(channel) {
      const botNames = Object.keys(bots);
      const respondCount = 2 + Math.floor(Math.random() * 3); // 2-4 bots respond
      const shuffled = botNames.sort(() => Math.random() - 0.5).slice(0, respondCount);

      shuffled.forEach((botName, i) => {
        const delay = 1200 + (i * 1500) + Math.random() * 1500;
        setTimeout(() => {
          $typingInd.textContent = botName + ' is typing...';
          setTimeout(() => {
            $typingInd.textContent = '';
            const bot = bots[botName];
            const useChannel = bot.responses[channel] && Math.random() > 0.3;
            const reply = pick(useChannel ? bot.responses[channel] : bot.responses.fallback);

            state.channels[channel].push({
              user: botName, text: reply, time: timeNow()
            });

            if (state.currentView.type === 'channel' && state.currentView.name === channel) {
              renderMessages();
            }
          }, 800 + Math.random() * 1200);
        }, delay);
      });
    }

    // ── Bot Response Logic (DMs) ──
    function triggerDMBotResponse(botName) {
      const delay = 1000 + Math.random() * 2000;
      setTimeout(() => {
        $typingInd.textContent = botName + ' is typing...';
        setTimeout(() => {
          $typingInd.textContent = '';
          const reply = pick(dmResponses[botName].replies);
          if (!state.dms[botName]) state.dms[botName] = [];
          state.dms[botName].push({
            user: botName, text: reply, time: timeNow()
          });

          if (state.currentView.type === 'dm' && state.currentView.name === botName) {
            renderMessages();
          } else {
            state.dmUnread[botName] = (state.dmUnread[botName] || 0) + 1;
            renderDMList();
          }
        }, 800 + Math.random() * 1000);
      }, delay);
    }

    // ── Send Message ──
    function sendMessage() {
      const text = $msgInput.value.trim();
      if (!text) return;
      const v = state.currentView;

      if (v.type === 'channel') {
        state.channels[v.name].push({ user: state.username, text, time: timeNow() });
        renderMessages();
        triggerBotResponses(v.name);
      } else {
        if (!state.dms[v.name]) state.dms[v.name] = [];
        state.dms[v.name].push({ user: state.username, text, time: timeNow() });
        renderMessages();
        triggerDMBotResponse(v.name);
      }

      $msgInput.value = '';
      $msgInput.focus();
    }

    // ── Channel Switch ──
    document.querySelectorAll('#channelList li').forEach(li => {
      li.addEventListener('click', () => switchToChannel(li.dataset.channel));
    });

    // ── Emoji Picker ──
    const emojiList = ['😂','🔥','💀','🎮','👑','⚡','💯','🤣','❤️','🙌','😎','🤙','💪','🏆','👀','🚀'];
    let emojiOpen = false;
    let emojiPanel = null;

    $emojiBtn.addEventListener('click', () => {
      if (emojiOpen && emojiPanel) {
        emojiPanel.remove();
        emojiOpen = false;
        return;
      }

      emojiPanel = document.createElement('div');
      emojiPanel.style.cssText =
        'position:absolute;bottom:80px;left:32px;background:#18181d;border:1px solid #2a2a32;' +
        'border-radius:12px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;z-index:50;';
      emojiList.forEach(em => {
        const btn = document.createElement('button');
        btn.textContent = em;
        btn.style.cssText = 'background:none;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:background .1s;';
        btn.onmouseenter = () => btn.style.background = '#2a2a32';
        btn.onmouseleave = () => btn.style.background = 'none';
        btn.onclick = () => {
          $msgInput.value += em;
          $msgInput.focus();
          emojiPanel.remove();
          emojiOpen = false;
        };
        emojiPanel.appendChild(btn);
      });

      document.querySelector('.chat-input-area').appendChild(emojiPanel);
      emojiOpen = true;
    });

    // ── Ambient Bot Messages ──
    function startAmbientChat() {
      setInterval(() => {
        const botName = pick(Object.keys(bots));
        const channels = Object.keys(state.channels);
        const channel = pick(channels);
        const bot = bots[botName];
        const pool = bot.responses[channel] || bot.responses.fallback;
        state.channels[channel].push({ user: botName, text: pick(pool), time: timeNow() });
        if (state.currentView.type === 'channel' && state.currentView.name === channel) {
          renderMessages();
        }
      }, 8000 + Math.random() * 12000);
    }

    // ── Join ──
    function join() {
      const name = $usernameIn.value.trim();
      if (!name) return;
      state.username = name;
      state.onlineUsers.add(name);
      $modal.classList.add('hidden');
      $msgInput.focus();

      state.channels.general.push({ system: true, text: name + ' joined the chat 🎮', time: timeNow() });
      Object.keys(bots).forEach(u => state.onlineUsers.add(u));

      renderOnline();
      renderDMList();
      renderMessages();

      // Welcome messages from random bots
      var welcomeBots = Object.keys(bots).sort(function() { return Math.random() - 0.5; }).slice(0, 4);
      var welcomeMsgs = [
        'Yo ' + sanitize(name) + '! Welcome to the arena 🔥 Chat or click a name to DM!',
        'Hey ' + sanitize(name) + '! Welcome! DM any of us to chat 1-on-1 🎮',
        'Ayy ' + sanitize(name) + ' just landed! What games you play? 👀',
        'Welcome ' + sanitize(name) + '! 30 of us here ready to chat, pick your vibe ✨'
      ];
      welcomeBots.forEach(function(bot, i) {
        setTimeout(function() {
          state.channels.general.push({
            user: bot,
            text: welcomeMsgs[i],
            time: timeNow()
          });
          renderMessages();
        }, 1200 + i * 1500);
      });

      startAmbientChat();
    }

    $joinBtn.addEventListener('click', join);
    $usernameIn.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

    // ── Send Events ──
    $sendBtn.addEventListener('click', sendMessage);
    $msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    // Close emoji on outside click
    document.addEventListener('click', e => {
      if (emojiOpen && emojiPanel && !emojiPanel.contains(e.target) && e.target !== $emojiBtn) {
        emojiPanel.remove();
        emojiOpen = false;
      }
    });
  </script>
</body>
</html>
